services:
  ai:
    build:
      context: ./ai
      dockerfile: Dockerfile
    env_file:
      - ./ai/.env
    environment:
      PORT: 8000
    ports:
      - "8000:8000"
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: deps
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: development
      PORT: 4000
    command: npm run dev
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
    ports:
      - "4000:4000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: deps
    env_file:
      - ./frontend/.env
    environment:
      AI_SERVICE_URL: http://ai:8000
      NEXT_PUBLIC_AI_SERVICE_URL: http://ai:8000
      NEXT_PUBLIC_API_BASE_URL: http://localhost:4000/api
      NODE_ENV: development
      PORT: 3000
    command: npm run dev -- --hostname 0.0.0.0 --port 3000
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend
      - ai
    ports:
      - "3000:3000"
    restart: unless-stopped

volumes:
  backend_node_modules:
  frontend_node_modules:
